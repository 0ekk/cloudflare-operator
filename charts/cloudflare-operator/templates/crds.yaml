{{- if .Values.installCRDs }}
{{- $files := .Files.Glob "files/crds/*.yaml" }}
{{- range $path, $_ := $files }}
{{- $crd := fromYaml ($.Files.Get $path) }}
{{- if and $.Values.webhook.enabled $.Values.certManager.enabled }}
{{- $annotations := default (dict) $crd.metadata.annotations }}
{{- $_ := set $annotations "cert-manager.io/inject-ca-from" (printf "%s/%s-serving-cert" $.Release.Namespace (include "cloudflare-operator.fullname" $)) }}
{{- $_ := set $crd.metadata "annotations" $annotations }}
{{- end }}
---
{{ toYaml $crd }}
{{- end }}
{{- end }}
